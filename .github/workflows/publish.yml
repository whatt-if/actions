name: '📦 Publish packages'

permissions:
  contents: write

on:
  workflow_call:
  pull_request:
    types: [closed]

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Cache Yarn dependencies
        uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'
          registry-url: https://npm.pkg.github.com

      - name: Configure NPM to use GitHub Packages
        run: npm config set //npm.pkg.github.com/:_authToken=${{ secrets.AUTH_TOKEN }}

      - name: Install dependencies
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: npm install

      - name: Check PR Labels
        id: check_labels
        run: |
          LABELS=$(jq -r '.pull_request.labels | .[] | .name' "$GITHUB_EVENT_PATH")
          echo "Labels found: $LABELS"
          if [[ "$LABELS" == *"stable"* ]]; then
            echo "Publishing as stable."
            echo "publish_type=stable" >> $GITHUB_ENV
          elif [[ "$LABELS" == *"beta"* ]]; then
            echo "Publishing as beta."
            echo "publish_type=beta" >> $GITHUB_ENV
          else
            echo "Publishing as alpha."
            echo "publish_type=alpha" >> $GITHUB_ENV
          fi

      - name: Set Git User
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Generate changelogs and update versions
        run: |
          npx lerna@5.1.6 version patch --yes --conventional-commits --conventional-graduate

      - name: Publish with Lerna
        env:
          NODE_AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          CHANGED_PACKAGES=$(npx lerna@5.1.6 changed --json | jq -r '.[] | select(.location | startswith("packages/")) | .name')
          if [ -z "$CHANGED_PACKAGES" ]; then
            echo "No packages changed, skipping publish."
            exit 0
          fi

          if [ "$publish_type" == "stable" ]; then
            npx lerna@5.1.6 publish patch --yes --conventional-commits --conventional-graduate
          elif [ "$publish_type" == "beta" ]; then
            npx lerna@5.1.6 publish prerelease --preid beta --yes --conventional-commits --conventional-prerelease
          else
            npx lerna@5.1.6 publish prerelease --preid alpha --yes --conventional-commits --conventional-prerelease
          fi
